services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${PG_DB:-postgres}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASS:-postgres}
    expose:
      - "5432"
    volumes:
      - database:/var/lib/postgresql/data

  redis:
    image: docker.io/library/redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD:-redis-default-password}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - redis:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      args:
        DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
    image: skygenesisenterprise/aether-mailer:${APP_IMAGE_TAG:-cloud}
    restart: unless-stopped
    env_file:
      - .env
    command: server
    expose:
      - "3000"
      - "8080"
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"

      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      HOST: ${DOMAIN_HOST:-localhost}
      FRONTEND_PORT: "3000"
      API_PORT: "8080"
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-.skygenesisenterprise.com}

      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}

      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-mailer:v1
      REDIS_DEFAULT_TTL: "300"

    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates

  worker:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      args:
        DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
    image: skygenesisenterprise/aether-mailer:${APP_IMAGE_TAG:-cloud}
    restart: unless-stopped
    env_file:
      - .env
    command: worker
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      WORKER_WAIT_FOR_DB: "true"

      HOST: ${DOMAIN_HOST:-localhost}

      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}

      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-mailer:v1

    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates

volumes:
  database:
  redis:
  media:
  certs:
  custom-templates:
