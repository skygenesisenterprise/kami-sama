services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS:-postgres}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_DB: ${PG_DB:-postgres}
    expose:
      - 5432
    networks:
      - kami-sama

  redis:
    image: docker.io/library/redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis-data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - 6379
    networks:
      - kami-sama

  rabbitmq:
    image: docker.io/library/rabbitmq:3.13-management-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      start_period: 30s
      interval: 30s
      retries: 5
      timeout: 10s
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    expose:
      - 5672
    networks:
      - kami-sama

  meilisearch:
    image: docker.io/getmeili/meilisearch:v1.7
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/health || exit 1"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - meilisearch-data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    expose:
      - 7700
    networks:
      - kami-sama

  server:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      args:
        DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
    image: kami-sama/platform:${APP_IMAGE_TAG:-cloud}
    restart: unless-stopped
    expose:
      - 3000
    command: server
    env_file:
      - .env
    environment:
      NODE_ENV: production
      FRONTEND_PORT: "3000"
      API_INTERNAL_URL: http://worker:8080/api/v1
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_REALTIME_URL: /api/v1/realtime/ws
    volumes:
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      worker:
        condition: service_started
    networks:
      - kami-sama

  worker:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      args:
        DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
    image: kami-sama/platform:${APP_IMAGE_TAG:-cloud}
    restart: unless-stopped
    expose:
      - 8080
    command: worker
    env_file:
      - .env
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      REDIS_KEY_PREFIX: kami-sama:v1
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-kami-sama}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      API_PORT: "8080"
      HOST: ${DOMAIN_HOST}
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - kami-sama

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  meilisearch-data:
  certs:
  custom-templates:

networks:
  kami-sama:
    driver: bridge
