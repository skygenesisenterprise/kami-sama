services:
  nginx:
    image: docker.io/library/nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - ${DEV_HTTP_BIND_HOST:-0.0.0.0}:${DEV_HTTP_PORT:-80}:80
    volumes:
      - ./infrastructure/web/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_started

  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS:-postgres}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_DB: ${PG_DB:-postgres}
    expose:
      - 5432

  redis:
    image: docker.io/library/redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD:-redis-dev-password}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
    expose:
      - 6379

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/aether-mailer:latest-dev
    pull_policy: never
    restart: unless-stopped
    expose:
      - 3000
    command: server
    environment:
      NODE_ENV: development
      FRONTEND_PORT: "3000"
      API_INTERNAL_URL: http://worker:8080/api/v1
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_REALTIME_URL: /api/v1/realtime/ws
      NEXT_PUBLIC_USE_PLATFORM_MOCKS: ${NEXT_PUBLIC_USE_PLATFORM_MOCKS:-false}
    volumes:
      - ./apps:/app/apps
      - /app/apps/node_modules
      - /app/apps/.next
      - ./entrypoint.sh:/entrypoint.sh
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      worker:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/aether-mailer:latest-dev
    pull_policy: never
    restart: unless-stopped
    ports:
      - 8080:8080
    command: air
    environment:
      NODE_ENV: development
      USE_EMBEDDED_DB: "false"
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-dev-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-mailer:v1
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      JWT_ISSUER: ${JWT_ISSUER:-aether-mailer}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-.skygenesisenterprise.localhost}
      CORS_ALLOWED_ORIGINS: http://mailer.skygenesisenterprise.localhost,http://api.mailer.skygenesisenterprise.localhost,http://mailer.skygenesisenterprise.lan,http://api.mailer.skygenesisenterprise.lan,http://localhost:3000,http://localhost:8081,http://127.0.0.1:8081,http://localhost:19006,http://127.0.0.1:19006,http://192.168.1.48:8081
      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      API_PORT: "8080"
      HOST: ${DOMAIN_HOST:-mailer.skygenesisenterprise.localhost}
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
    volumes:
      - ./server:/app/server
      - ./go.mod:/app/go.mod
      - ./go.sum:/app/go.sum
      - ./entrypoint.sh:/entrypoint.sh
      - ./.air.toml:/app/.air.toml
      - gopkg:/go/pkg
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  mailer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/aether-mailer:latest-dev
    pull_policy: never
    restart: unless-stopped
    command: mailer
    ports:
      - "2525:25"
      - "2465:465"
      - "2587:587"
      - "2143:143"
      - "2993:993"
    environment:
      API_PORT: "8080"
      HOST: "0.0.0.0"
      GIN_MODE: debug
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
      REDIS_DB: "1"
      REDIS_KEY_PREFIX: aether-mail:v1
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME:-mail.skygenesisenterprise.localhost}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-skygenesisenterprise.localhost}
      TLS_CERT_PATH: /certs/mail.crt
      TLS_KEY_PATH: /certs/mail.key
    volumes:
      - ./server:/app/server
      - ./go.mod:/app/go.mod
      - ./go.sum:/app/go.sum
      - ./entrypoint.sh:/entrypoint.sh
      - gopkg:/go/pkg
      - mail-storage:/var/lib/aether-mail
      - certs:/certs
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  database:
  redis:
  gopkg:
  media:
  certs:
  custom-templates:
  mail-storage:
