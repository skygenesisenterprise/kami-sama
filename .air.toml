root = "."
testdir = "."

[build]
  args_bin     = []
  entrypoint   = "/app/tmp/aether-server"
  cmd          = "cd /app/server && go build -o /app/tmp/aether-server ."
  dir          = "/app"
  delay        = 1000
  exclude_dir  = [
    "assets", "tmp", "vendor",
    "app", "components", "config", "context",
    "hooks", "i18n", "lib", "logs",
    "node_modules", "prisma", "public", "styles"
  ]
  exclude_file          = []
  exclude_regex         = ["_test\\.go"]
  exclude_unchanged     = true
  follow_symlinks       = false
  include_dir           = ["server"]
  include_ext           = ["go"]
  kill_delay            = "2s"
  log                   = "build-errors.log"
  poll                  = false
  poll_interval         = 0
  rerun                 = false
  rerun_delay           = 500
  send_interrupt        = true
  stop_on_error         = false

[color]
  app   = ""
  build = "yellow"
  main  = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time      = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll      = true